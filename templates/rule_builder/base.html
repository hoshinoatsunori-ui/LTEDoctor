<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}LTE DiagRule Builder{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .severity-critical { background: #dc3545; }
    .severity-high     { background: #fd7e14; }
    .severity-medium   { background: #0dcaf0; color: #000; }
    .severity-low      { background: #198754; }
    .severity-info     { background: #6c757d; }
    .rule-card { transition: box-shadow .15s; }
    .rule-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.12); }
    .yaml-preview { font-size: .78rem; background: #1e1e1e; color: #d4d4d4;
                    border-radius: 6px; padding: 12px; min-height: 180px;
                    white-space: pre; overflow-x: auto; }
    .match-badge { min-width: 2rem; }
    #toast-container { position: fixed; top: 1rem; right: 1rem; z-index: 9999; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('index') }}">
      <i class="bi bi-activity me-2"></i>LTE DiagRule Builder
    </a>
    <div class="ms-auto d-flex gap-2">
      <a href="{{ url_for('index') }}" class="btn btn-outline-light btn-sm">
        <i class="bi bi-list-ul me-1"></i>ルール一覧
      </a>
      <a href="{{ url_for('rule_new') }}" class="btn btn-success btn-sm">
        <i class="bi bi-plus-lg me-1"></i>ルール追加
      </a>
    </div>
  </div>
</nav>

<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ cat }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>

<div id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function showToast(msg, type='success') {
  const el = document.createElement('div');
  el.className = `toast align-items-center text-bg-${type} border-0 show mb-2`;
  el.setAttribute('role', 'alert');
  el.innerHTML = `<div class="d-flex"><div class="toast-body">${msg}</div>
    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button></div>`;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
